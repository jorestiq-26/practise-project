name: Lint, Test, Deploy Project 
on: [push, workflow_dispatch]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install dependencies
        run: npm install
      - name: Run lint
        run: npm run lint
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Install Node
        uses: actions/checkout@v3
        with:
          node-version: 18
      - name: Install dependancies
        run: npm ci
      - name: Run tests
        run: npm test   
  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Insale Node
        uses: actions/checkout@v3
        with:
          node-version: 18
      - name: Install dependancies
        run: npm ci
      - name: Build project
        run: npm run build
      - name: Deploy  
        run: echo "Deploying ..." 
